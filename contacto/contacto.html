<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto</title>
    <link rel="stylesheet" href="../style/style_contacto.css">
</head>

<body>

<!-- HEADER -->
<div class="header">
    <h2>Contacto</h2>
    <a href="../index.html">← Volver</a>
</div>

<!-- CONTENIDO -->
<div class="container">

    <!-- FORMULARIO -->
    <form class="formulario">
        <h3>Envíanos un mensaje</h3>

        <input type="text" placeholder="Nombre" required>
        <input type="email" placeholder="Correo electrónico" required>
        <textarea placeholder="Escribe tu mensaje..." required></textarea>

        <button type="submit">Enviar</button>
    </form>

    <!-- INFO -->
    <div class="info">
        <h3>Información</h3>
        <p><strong>Email:</strong> educatec@gmail.com</p>
        <p><strong>Teléfono:</strong> +57 300 123 4567</p>
        <p><strong>Ubicación:</strong> Colombia</p>

        <p class="extra">Responderemos lo más pronto posible.</p>
    </div>

    <div class="mapa-box">
    <h3>Ubicación</h3>
    <iframe src="https://www.google.com/maps/embed?pb=!1m14!1m8!1m3!1d31809.917075500034!2d-74.1457854!3d4.7283889!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x8e3f834f39f65495%3A0x393206adcd4df77e!2sC.E.D.%20General%20Santander!5e0!3m2!1ses-419!2sco!4v1775833223027!5m2!1ses-419!2sco" width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
</div>

</div>

</body>
</html>
