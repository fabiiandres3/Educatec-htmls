<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Contraseña</title>
    <link rel="stylesheet" href="/style/style_olvido.css">
</head>

<body>

<div class="container">

    <form class="form-box">

        <h2>Recuperar contraseña</h2>
        <p>Ingresa tu correo y te enviaremos instrucciones</p>

        <div class="input-group">
            <label>Correo electrónico</label>
            <input type="email" required placeholder="ejemplo@email.com">
        </div>

        <button type="submit">Enviar</button>

        <div class="extra">
            <a href="/formularios/formulario.html">← Volver al inicio de sesión</a>
        </div>

    </form>

</div>

</body>
</html>
