<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Inicio de Sesión - INNOTEC</title>
    <link rel="stylesheet" href="../style/style_formulario.css">
</head>

<body>

    <h2 align="center">Inicio de Sesión</h2>

    <form id="loginForm" method="POST" align="center">

        <p><a href="../index.html">Volver</a></p>

        <label for="correo">Correo:</label><br>
        <input type="email" name="correo" id="correo" required><br><br>

        <label for="contrasena">Contraseña:</label><br>
        <input type="password" name="contrasena" id="contrasena" required><br><br>

        <label for="rol">Rol:</label><br>
        <select name="rol" id="rol" required>
            <option value="">Seleccione</option>
            <option value="../alumno/alumno_dashboard.html">Estudiante</option>
            <option value="../docente/docente_dashboard.html">Docente</option>
            <option value="../admin/admin_dashboard.html">Administrador</option>
        </select><br><br>

        <button type="submit">Ingresar</button>

    </form>

    <script>
        document.getElementById("loginForm").addEventListener("submit", function(e) {
            e.preventDefault();

            var rol = document.getElementById("rol").value;

            if (rol !== "") {
                window.location.href = rol;
            } else {
                alert("Seleccione un rol");
            }
        });
    </script>

</body>

</html>
