<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Contenido Académico</title>
    <link rel="stylesheet" href="/style/style_form_contenido.css">
</head>

<body>

<div class="container">

    <form action="contenido.html" method="POST" enctype="multipart/form-data" class="formulario">

        <div class="header">
            <h2>Registro de Contenido</h2>
            <a href="../index.html">← Volver</a>
        </div>

        <div class="grid">

            <div class="form-group">
                <label>Título</label>
                <input type="text" name="titulo" placeholder="Ej: Guía de sintaxis" required>
            </div>

            <div class="form-group">
                <label>Tipo</label>
                <select name="tipo" required>
                    <option disabled selected>Seleccionar...</option>
                    <option value="video">Video</option>
                    <option value="pdf">PDF</option>
                    <option value="imagen">Imagen</option>
                </select>
            </div>

            <div class="form-group full">
                <label>Descripción</label>
                <textarea name="descripcion" placeholder="Describe el contenido..."></textarea>
            </div>

            <div class="form-group">
                <label>Archivo</label>
                <input type="file" name="archivo" required>
            </div>

            <div class="form-group">
                <label>Fecha</label>
                <input type="date" name="fecha" required>
            </div>

            <div class="form-group full">
                <label>Módulo</label>
                <select name="modulo" required>
                    <option disabled selected>Seleccionar módulo...</option>
                    <option>Módulo 1: Introducción</option>
                    <option>Módulo 2: Desarrollo Lógico</option>
                    <option>Módulo 3: Implementación</option>
                </select>
            </div>

            <div class="form-group full checkbox">
                <label>
                    <input type="checkbox" name="revisado">
                    Contenido revisado
                </label>
            </div>

        </div>

        <button type="submit">Guardar</button>

    </form>

</div>

</body>
</html>
