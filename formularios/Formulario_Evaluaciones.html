<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evaluaciones</title>
    <link rel="stylesheet" href="/style/style_evaluaciones.css">
</head>

<body>

<a href="../alumno/alumno_evaluaciones.html" class="volver">← Volver</a>

<div class="container">

    <form action="../actividades/atividad_subida.html" method="POST" enctype="multipart/form-data" class="form-box">

        <h1>Evaluaciones</h1>

        <div class="input-group">
            <label>Título</label>
            <input type="text" name="titulo" required>
        </div>

        <div class="input-group">
            <label>Descripción</label>
            <textarea name="descripcion" required></textarea>
        </div>

        <div class="input-group">
            <label>Subir archivo</label>
            <input type="file" name="archivo">
        </div>

        <button type="submit">Enviar actividad</button>

    </form>

</div>

</body>
</html>
