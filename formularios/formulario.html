<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Inicio de Sesión - Educatec</title>
    <link rel="stylesheet" href="/style/style_formulario.css">
</head>
<body>

<div class="login-container">

    <h2>Inicio de Sesión</h2>

    <form id="loginForm">

        <label for="correo">Correo electrónico</label>
        <input type="email" id="correo" required>

        <label for="contrasena">Contraseña</label>
        <input type="password" id="contrasena" required>

        <label for="rol">Rol</label>
        <select id="rol" required>
            <option value="">Seleccione su rol</option>
            <option value="../alumno/alumno_dashboard.html">Estudiante</option>
            <option value="../docente/docente_dashboard.html">Docente</option>
            <option value="../admin/admin_dashboard.html">Administrador</option>
        </select>

        <button type="submit">Ingresar</button>

    </form>

    <div class="extra">
        <p><a href="../index.html">← Volver</a></p>
        <p><a href="../formularios/formulario_olvido_contraseña.html">¿Olvidó su contraseña?</a></p>
    </div>

</div>

<script>
document.getElementById("loginForm").addEventListener("submit", function(e) {
    e.preventDefault();

    let rol = document.getElementById("rol").value;

    if (rol !== "") {
        window.location.href = rol;
    } else {
        alert("Seleccione un rol");
    }
});
</script>

</body>
</html>
