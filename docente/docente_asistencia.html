<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Asistencia</title>
    <link rel="stylesheet" href="../style/style_docente_asistencia.css">
</head>

<body>

<!-- HEADER -->
<div class="header">
    <h2>Registro de Asistencia</h2>
    <a href="docente_dashboard.html">← Volver</a>
</div>

<!-- CONTENIDO -->
<div class="content">

    <form class="form">

        <div class="input-group">
            <label>Alumno</label>
            <input type="text" placeholder="Ingrese nombre del alumno">
        </div>

        <div class="input-group">
            <label>Estado</label>
            <select>
                <option>Seleccione estado</option>
                <option>Presente</option>
                <option>Ausente</option>
            </select>
        </div>

        <button type="submit">Guardar</button>

    </form>

</div>

</body>
</html>
