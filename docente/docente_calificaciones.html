<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Calificaciones</title>
    <link rel="stylesheet" href="/style/style_docente_notas.css">
</head>

<body>

<!-- HEADER -->
<div class="header">
    <h2>Registro de Notas</h2>
    <a href="docente_dashboard.html">← Volver</a>
</div>

<!-- CONTENIDO -->
<div class="content">

    <form class="form">

        <div class="input-group">
            <label>Alumno</label>
            <input type="text" placeholder="Nombre del alumno">
        </div>

        <div class="input-group">
            <label>Nota</label>
            <input type="number" step="0.1" min="0" max="5" placeholder="Ej: 4.5">
        </div>

        <!-- PREVIEW -->
        <div class="preview">
            <p>Nota actual:</p>
            <span id="valorNota">0.0</span>
        </div>

        <button type="submit">Guardar</button>

    </form>

</div>

<script>
const inputNota = document.querySelector("input[type='number']");
const valor = document.getElementById("valorNota");

inputNota.addEventListener("input", () => {
    valor.textContent = inputNota.value || "0.0";
});
</script>

</body>
</html>
